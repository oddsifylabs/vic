<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ABYSSAL</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; background:#000; overflow:hidden; }
canvas { display:block; position:fixed; top:0; left:0; cursor:crosshair; }

/* Floating popups */
#popups { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:10; }
.popup {
  position:absolute; left:50%; transform:translateX(-50%);
  font-family:'Share Tech Mono',monospace; font-size:13px; letter-spacing:3px;
  text-align:center; white-space:nowrap; pointer-events:none;
  transition:opacity 0.3s;
}
.popup.trait {
  background:rgba(0,10,30,0.92); border:1px solid rgba(80,180,255,0.35);
  border-radius:20px; padding:8px 20px; color:rgba(140,220,255,1);
  box-shadow:0 0 20px rgba(80,180,255,0.3);
}
.popup.xp { color:rgba(160,255,180,0.9); font-size:12px; }
.popup.zone {
  background:rgba(0,10,30,0.0); color:rgba(140,220,255,1);
  font-family:'Orbitron',monospace; font-size:11px; letter-spacing:6px;
  text-transform:uppercase;
}
.popup.level {
  background:rgba(80,0,140,0.85); border:1px solid rgba(160,80,255,0.5);
  border-radius:20px; padding:10px 24px; color:rgba(200,140,255,1);
  box-shadow:0 0 30px rgba(120,0,200,0.5); font-size:14px;
}
.popup.damage { color:rgba(255,80,80,0.95); font-size:14px; font-family:'Orbitron',monospace; }

/* Pause overlay */
#pauseScreen {
  display:none; position:fixed; inset:0; z-index:20;
  background:rgba(0,5,20,0.85); backdrop-filter:blur(4px);
  justify-content:center; align-items:center; flex-direction:column; gap:16px;
  font-family:'Orbitron',monospace; color:rgba(80,180,255,0.9);
}
#pauseScreen.active { display:flex; }
#pauseScreen h1 { font-size:32px; letter-spacing:12px; margin-bottom:8px; text-shadow:0 0 30px rgba(80,180,255,0.7); }
#pauseScreen .hint { font-family:'Share Tech Mono',monospace; font-size:11px; letter-spacing:3px; color:rgba(80,140,180,0.55); margin-top:4px; }
#pauseBtn {
  border:1px solid rgba(80,180,255,0.4); background:rgba(0,20,50,0.6);
  color:rgba(100,200,255,0.9); font-family:'Orbitron',monospace;
  font-size:12px; letter-spacing:4px; padding:12px 32px; cursor:pointer;
  transition:all 0.2s; border-radius:2px;
}
#pauseBtn:hover { background:rgba(0,40,90,0.8); box-shadow:0 0 20px rgba(80,180,255,0.3); }

/* Mobile joystick */
#joystick { display:none; position:fixed; bottom:100px; left:40px; z-index:15; pointer-events:none; }
#joystickBase {
  width:80px; height:80px; border-radius:50%;
  border:2px solid rgba(80,180,255,0.3); background:rgba(0,20,50,0.4);
  position:relative;
}
#joystickKnob {
  width:32px; height:32px; border-radius:50%;
  background:rgba(80,180,255,0.5); border:1px solid rgba(80,180,255,0.7);
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  transition:transform 0.05s;
}
@media (pointer:coarse) { #joystick { display:block; pointer-events:auto; } }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="popups"></div>
<div id="pauseScreen">
  <h1>PAUSED</h1>
  <div class="hint">ESC or P to resume</div>
  <button id="pauseBtn" onclick="togglePause()">— RESUME —</button>
  <div style="font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:3px;color:rgba(80,120,160,0.5);margin-top:16px;line-height:1.8">
    WASD / ARROWS · move<br>
    SPACE · dash<br>
    CLICK · place lure<br>
    ESC / P · pause
  </div>
</div>
<div id="joystick">
  <div id="joystickBase"><div id="joystickKnob"></div></div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const popupsEl = document.getElementById('popups');

function resize(){ canvas.width=window.innerWidth; canvas.height=window.innerHeight; }
resize();
window.addEventListener('resize', resize);

// ===== GAME STATE =====
let state = 0; // 0=title, 1=playing, 2=dead, 3=win, 4=paused_was_1
let keys = {}, camY = 0;
let p, creatures=[], particles=[], lures=[], inkClouds=[];
let currentZone=0, bossSpawned=false, boss=null;
let msgText='', msgOpacity=0, msgTimer=null;
let zoneName='SUNLIT ZONE', zoneAccent=[80,200,255];
let titleAnim=0;
let fadeAlpha=0, fadingIn=false, fadingOut=false, fadeCallback=null;
let xpFloaters=[], dmgFloaters=[];
let warnFlash=0;
let pausedState=0;
let joystickActive=false, joystickDx=0, joystickDy=0;

// ===== AUDIO =====
let audioCtx=null;
function getAC(){ if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)(); return audioCtx; }
let ambOsc=null, ambGain=null;
function startAmbient(zone){
  try{
    const ac=getAC();
    if(ambOsc){try{ambOsc.stop();}catch(e){}}
    const freq=[55,48,42,36][zone]||55;
    const o=ac.createOscillator(), g=ac.createGain(), f=ac.createBiquadFilter();
    f.type='lowpass'; f.frequency.value=220;
    o.type='sine'; o.frequency.value=freq;
    g.gain.setValueAtTime(0,ac.currentTime);
    g.gain.linearRampToValueAtTime(0.07,ac.currentTime+2);
    o.connect(f); f.connect(g); g.connect(ac.destination); o.start();
    ambOsc=o; ambGain=g;
  }catch(e){}
}
function sfxEat(){try{const ac=getAC(),o=ac.createOscillator(),g=ac.createGain();o.type='sine';o.frequency.setValueAtTime(300,ac.currentTime);o.frequency.exponentialRampToValueAtTime(80,ac.currentTime+0.12);g.gain.setValueAtTime(0.15,ac.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.15);o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+0.15);}catch(e){}}
function sfxEvolve(){try{const ac=getAC();[220,330,440,550,660].forEach((f,i)=>{const o=ac.createOscillator(),g=ac.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(0,ac.currentTime+i*0.08);g.gain.linearRampToValueAtTime(0.1,ac.currentTime+i*0.08+0.05);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+i*0.08+0.4);o.connect(g);g.connect(ac.destination);o.start(ac.currentTime+i*0.08);o.stop(ac.currentTime+i*0.08+0.4);});}catch(e){}}
function sfxDamage(){try{const ac=getAC(),b=ac.createBuffer(1,ac.sampleRate*0.1,ac.sampleRate),d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2);const s=ac.createBufferSource(),g=ac.createGain();g.gain.value=0.25;s.buffer=b;s.connect(g);g.connect(ac.destination);s.start();}catch(e){}}
function sfxBoss(){try{const ac=getAC(),o=ac.createOscillator(),g=ac.createGain();o.type='sawtooth';o.frequency.setValueAtTime(100,ac.currentTime);o.frequency.exponentialRampToValueAtTime(30,ac.currentTime+0.4);g.gain.setValueAtTime(0.2,ac.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.4);o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+0.4);}catch(e){}}
function sfxZone(){try{const ac=getAC();[110,138,165].forEach((f,i)=>{const o=ac.createOscillator(),g=ac.createGain();o.type='triangle';o.frequency.value=f;g.gain.setValueAtTime(0,ac.currentTime+i*0.12);g.gain.linearRampToValueAtTime(0.06,ac.currentTime+i*0.12+0.1);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+i*0.12+0.8);o.connect(g);g.connect(ac.destination);o.start(ac.currentTime+i*0.12);o.stop(ac.currentTime+i*0.12+0.9);});}catch(e){}}

// ===== ZONES =====
const ZONES=[
  {name:'SUNLIT ZONE',   accent:[80,200,255], bg0:[0,12,32],   bg1:[0,8,22],  fog:0},
  {name:'TWILIGHT ZONE', accent:[60,130,220], bg0:[0,6,22],    bg1:[0,4,16],  fog:0.1},
  {name:'MIDNIGHT ZONE', accent:[40,60,150],  bg0:[0,3,14],    bg1:[0,2,10],  fog:0.2},
  {name:'HADAL ZONE',    accent:[100,30,160], bg0:[4,0,12],    bg1:[2,0,8],   fog:0.3},
];
const ZONE_DEPTHS=[0,1000,2000,3000]; // depths at which zones start

// ===== CREATURE TEMPLATES =====
const T=[
  {name:'plankton',   r:4,  spd:0.5,col:[60,220,160], pts:5,  danger:0,  tier:0,trait:null},
  {name:'mote',       r:7,  spd:0.7,col:[100,230,200],pts:8,  danger:0,  tier:0,trait:null},
  {name:'shrimp',     r:11, spd:1.4,col:[220,150,70], pts:14, danger:0.3,tier:1,trait:'swift'},
  {name:'jellyfish',  r:15, spd:0.5,col:[180,90,255], pts:20, danger:0.1,tier:1,trait:'luminous'},
  {name:'seahorse',   r:10, spd:0.6,col:[200,160,40], pts:12, danger:0,  tier:1,trait:null},
  {name:'anglerfish', r:20, spd:1.0,col:[60,80,200],  pts:28, danger:0.9,tier:2,trait:'lure'},
  {name:'eel',        r:18, spd:1.5,col:[40,180,80],  pts:32, danger:1.0,tier:2,trait:'regen'},
  {name:'manta',      r:24, spd:1.2,col:[30,120,180], pts:38, danger:0.6,tier:2,trait:null},
  {name:'viperfish',  r:19, spd:1.8,col:[60,180,120], pts:35, danger:1.2,tier:2,trait:'swift'},
  {name:'squid',      r:26, spd:1.2,col:[160,40,120], pts:45, danger:1.5,tier:3,trait:'ink'},
  {name:'dragonfish', r:22, spd:1.6,col:[180,40,40],  pts:42, danger:1.6,tier:3,trait:null},
  {name:'coelacanth', r:30, spd:0.9,col:[40,80,160],  pts:55, danger:1.3,tier:3,trait:'armored'},
  {name:'leviathan',  r:48, spd:0.8,col:[20,50,120],  pts:80, danger:2.5,tier:4,trait:'armored'},
];
const TRAITS={swift:'⚡ SWIFT',luminous:'✦ LUMINOUS',lure:'◉ LURE',regen:'↻ REGEN',ink:'◈ INK',armored:'⬡ ARMORED'};

// ===== POPUP SYSTEM =====
function spawnPopup(text, cls, worldY, durationMs=2000){
  const el=document.createElement('div');
  el.className='popup '+cls;
  el.textContent=text;
  el.style.top=(worldY!=null? Math.max(60, worldY-camY-40)+'px' : '38%');
  el.style.opacity='1';
  popupsEl.appendChild(el);
  const startY=parseFloat(el.style.top);
  const start=performance.now();
  const drift=cls==='xp'||cls==='damage'?1.2:0.3;
  function tick(now){
    const t=(now-start)/durationMs;
    if(t>=1){el.remove();return;}
    el.style.top=(startY-drift*durationMs*t)+'px';
    el.style.opacity=t>0.6?(1-(t-0.6)/0.4):'1';
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

// ===== FADE =====
function fadeOutIn(cb){
  fadingOut=true; fadeAlpha=0; fadeCallback=cb;
}
function updateFade(){
  if(fadingOut){ fadeAlpha=Math.min(1,fadeAlpha+0.04); if(fadeAlpha>=1){fadingOut=false;fadingIn=true;if(fadeCallback){fadeCallback();fadeCallback=null;}} }
  else if(fadingIn){ fadeAlpha=Math.max(0,fadeAlpha-0.04); if(fadeAlpha<=0)fadingIn=false; }
}

// ===== INIT =====
function initPlayer(){
  p={x:canvas.width/2,y:300,vx:0,vy:0,r:14,hp:100,maxHp:100,
     hunger:100,xp:0,xpNext:80,level:0,traits:[],eaten:0,
     iframes:0,dashCD:0,trail:[],angle:0,luminous:false,
     score:0};
}

function spawnCreature(){
  const W=canvas.width,H=canvas.height;
  const maxTier=Math.min(4,Math.floor((camY+H/2)/700));
  const pool=T.filter(t=>t.tier<=maxTier);
  const weights=pool.map(t=>Math.pow(2.5,maxTier-t.tier));
  const total=weights.reduce((a,b)=>a+b,0);
  let rnd=Math.random()*total,tmpl=pool[0];
  for(let i=0;i<pool.length;i++){rnd-=weights[i];if(rnd<=0){tmpl=pool[i];break;}}
  return{x:Math.random()*W,y:camY+Math.random()*H,
    vx:(Math.random()-0.5)*tmpl.spd,vy:(Math.random()-0.5)*tmpl.spd,
    r:tmpl.r*(0.8+Math.random()*0.5),tmpl,
    angle:0,wobble:Math.random()*Math.PI*2,pulse:Math.random()*Math.PI*2,
    wander:Math.random()*Math.PI*2,wanderT:0,alive:true};
}

function spawnBoss(){
  if(bossSpawned)return; bossSpawned=true;
  boss={x:canvas.width/2,y:camY+canvas.height*0.3,vx:0,vy:0,r:80,
    hp:1200,maxHp:1200,phase:1,chargeCD:200,charging:false,
    chargeVx:0,chargeVy:0,wobble:0,pulse:0,alive:true,
    tentacles:Array.from({length:8},(_,i)=>({angle:(i/8)*Math.PI*2,len:60+Math.random()*40,wobble:Math.random()*Math.PI*2}))};
  spawnPopup('☠  ABYSSAL COLOSSUS AWAKENS','zone',null,4000);
  sfxBoss();
}

function burst(x,y,col,n,spd,life){
  for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=Math.random()*spd;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,col,life,maxLife:life,r:1.5+Math.random()*2.5});}
}

function gainTrait(name){
  if(!p||p.traits.includes(name))return;
  p.traits.push(name); if(name==='luminous')p.luminous=true;
  spawnPopup((TRAITS[name]||name)+' ABSORBED','trait',p.y,2800);
  sfxEvolve();
}

// ===== PAUSE =====
function togglePause(){
  if(state===1){ state=4; document.getElementById('pauseScreen').classList.add('active'); }
  else if(state===4){ state=1; document.getElementById('pauseScreen').classList.remove('active'); }
}

// ===== UPDATE =====
function update(){
  const W=canvas.width,H=canvas.height;
  const spd=2.8*(p.traits.includes('swift')?1.35:1);

  // Keyboard + joystick input
  const jx=joystickActive?joystickDx:0;
  const jy=joystickActive?joystickDy:0;
  if(keys['a']||keys['A']||keys['ArrowLeft']||jx<-0.2)  p.vx-=0.38;
  if(keys['d']||keys['D']||keys['ArrowRight']||jx>0.2) p.vx+=0.38;
  if(keys['w']||keys['W']||keys['ArrowUp']||jy<-0.2)    p.vy-=0.38;
  if(keys['s']||keys['S']||keys['ArrowDown']||jy>0.2)  p.vy+=0.38;

  if((keys[' ']||keys['Space'])&&p.dashCD<=0){
    const len=Math.sqrt(p.vx*p.vx+p.vy*p.vy)||1;
    p.vx+=p.vx/len*11;p.vy+=p.vy/len*11;p.dashCD=85;
    burst(p.x,p.y-camY,[80,200,255],8,3,20);
  }
  if(p.dashCD>0)p.dashCD--;
  p.vx*=0.85;p.vy*=0.85;
  const vel=Math.sqrt(p.vx*p.vx+p.vy*p.vy);
  if(vel>spd){p.vx=p.vx/vel*spd;p.vy=p.vy/vel*spd;}
  p.x+=p.vx;p.y+=p.vy;
  if(p.x<0)p.x=W;if(p.x>W)p.x=0;
  p.y=Math.max(10,Math.min(5000,p.y));
  if(vel>0.1)p.angle=Math.atan2(p.vy,p.vx);
  camY+=(p.y-H*0.4-camY)*0.07;
  camY=Math.max(0,Math.min(5000-H,camY));
  p.trail.unshift({x:p.x,y:p.y-camY});
  if(p.trail.length>16)p.trail.pop();

  p.hunger-=0.015;
  if(p.hunger<0){p.hunger=0;p.hp-=0.04;}
  if(p.hunger<20) warnFlash=Math.min(1,warnFlash+0.02);
  else warnFlash=Math.max(0,warnFlash-0.04);
  if(p.traits.includes('regen'))p.hp=Math.min(p.maxHp,p.hp+0.018);
  if(p.iframes>0)p.iframes--;
  lures=lures.filter(l=>{l.life--;return l.life>0;});
  inkClouds.forEach(c=>{c.r=Math.min(c.maxR,c.r+1.2);c.life--;c.alpha=0.5*(c.life/c.maxLife);});
  inkClouds=inkClouds.filter(c=>c.life>0);

  // Zone change
  const nz=Math.min(3,Math.floor(p.y/1000));
  if(nz!==currentZone){
    currentZone=nz;
    zoneAccent=ZONES[nz].accent; zoneName=ZONES[nz].name;
    spawnPopup('◈  '+ZONES[nz].name,'zone',null,3000);
    sfxZone();
    startAmbient(nz);
    burst(p.x,p.y-camY,ZONES[nz].accent,20,4,50);
  }
  if(p.y>4000&&!bossSpawned)spawnBoss();

  // Boss
  if(boss&&boss.alive){
    boss.wobble+=0.03;boss.pulse+=0.025;
    boss.tentacles.forEach(t=>t.wobble+=0.04);
    const bsx=p.x-boss.x,bsy=p.y-boss.y,bd=Math.sqrt(bsx*bsx+bsy*bsy)||1;
    boss.chargeCD--;
    if(boss.charging){
      boss.x+=boss.chargeVx;boss.y+=boss.chargeVy;
      boss.chargeVx*=0.97;boss.chargeVy*=0.97;
      if(Math.sqrt(boss.chargeVx**2+boss.chargeVy**2)<0.5)boss.charging=false;
    } else {
      const bs=boss.phase>=2?0.9:0.6;
      boss.vx+=(bsx/bd)*bs*0.08;boss.vy+=(bsy/bd)*bs*0.08;
      boss.vx*=0.94;boss.vy*=0.94;boss.x+=boss.vx;boss.y+=boss.vy;
      if(boss.chargeCD<=0&&bd<450){
        boss.charging=true;boss.chargeVx=(bsx/bd)*13;boss.chargeVy=(bsy/bd)*13;
        boss.chargeCD=boss.phase>=2?130:210; burst(boss.x,boss.y-camY,[80,0,140],20,5,40);
      }
    }
    if(boss.hp/boss.maxHp<0.5&&boss.phase===1){
      boss.phase=2;
      spawnPopup('☠  COLOSSUS ENRAGES','zone',null,3000);
      burst(boss.x,boss.y-camY,[200,0,80],40,6,60);
    }
    if(bd<boss.r+p.r&&p.iframes<=0){
      let dmg=20;if(p.traits.includes('armored'))dmg*=0.5;
      p.hp-=dmg;p.iframes=60;sfxDamage();
      burst(p.x,p.y-camY,[255,60,60],14,3,35);
      spawnPopup('-'+Math.round(dmg),'damage',p.y,1400);
    }
  }

  // Creatures
  for(let i=creatures.length-1;i>=0;i--){
    const c=creatures[i];
    c.wobble+=0.05;c.pulse+=0.04;c.wanderT--;
    if(c.wanderT<=0){c.wander+=(Math.random()-0.5)*1.8;c.wanderT=60+Math.random()*100;}
    const sx=p.x-c.x,sy=p.y-c.y,dist=Math.sqrt(sx*sx+sy*sy)||1;
    if(c.tmpl.danger<0.5)lures.forEach(l=>{const lx=l.x-c.x,ly=l.worldY-c.y,ld=Math.sqrt(lx*lx+ly*ly)||1;if(ld<160){c.vx+=lx/ld*0.09;c.vy+=ly/ld*0.09;}});
    inkClouds.forEach(ik=>{const ix=ik.x-c.x,iy=ik.y-c.y,id=Math.sqrt(ix*ix+iy*iy)||1;if(id<ik.r+20){c.vx-=ix/id*0.3;c.vy-=iy/id*0.3;}});
    if(dist<200+c.r*4){
      if(c.r>p.r*1.2){c.vx+=sx/dist*c.tmpl.spd*0.18;c.vy+=sy/dist*c.tmpl.spd*0.18;}
      else if(c.r<p.r*0.9){c.vx-=sx/dist*c.tmpl.spd*0.24;c.vy-=sy/dist*c.tmpl.spd*0.24;}
    } else {c.vx+=Math.cos(c.wander)*c.tmpl.spd*0.06;c.vy+=Math.sin(c.wander)*c.tmpl.spd*0.06;}
    const cv=Math.sqrt(c.vx*c.vx+c.vy*c.vy)||1;
    if(cv>c.tmpl.spd*1.6){c.vx=c.vx/cv*c.tmpl.spd*1.6;c.vy=c.vy/cv*c.tmpl.spd*1.6;}
    c.vx*=0.9;c.vy*=0.9;c.x+=c.vx;c.y+=c.vy;
    if(c.x<0)c.x=W;if(c.x>W)c.x=0;
    c.y=Math.max(0,Math.min(5000,c.y));
    if(cv>0.05)c.angle=Math.atan2(c.vy,c.vx);
    if(dist<c.r+p.r-4){
      if(c.r>p.r*1.15){
        if(p.iframes<=0){let dmg=c.tmpl.danger*11;if(p.traits.includes('armored'))dmg*=0.5;p.hp-=dmg;p.iframes=50;sfxDamage();burst(p.x,p.y-camY,[255,60,60],10,2.5,30);
          spawnPopup('-'+Math.round(dmg),'damage',p.y,1400);
          if(p.traits.includes('ink')){inkClouds.push({x:p.x,y:p.y,r:10,maxR:80,life:180,maxLife:180,alpha:0.6});c.vx-=sx/dist*7;c.vy-=sy/dist*7;spawnPopup('◈ INK RELEASED','trait',p.y);}}
      } else if(c.r<=p.r+2){
        c.alive=false;sfxEat();
        p.hunger=Math.min(100,p.hunger+c.tmpl.pts*0.4);
        p.xp+=c.tmpl.pts;p.eaten++;p.score+=c.tmpl.pts;
        burst(c.x,c.y-camY,c.tmpl.col,12,2,35);
        spawnPopup('+'+c.tmpl.pts,'xp',c.y,1200);
        if(c.tmpl.trait&&!p.traits.includes(c.tmpl.trait)&&Math.random()<0.35)gainTrait(c.tmpl.trait);
        if(p.xp>=p.xpNext)levelUp();
        p.r=Math.min(70,14+p.level*6+p.eaten*0.035);
      }
    }
  }
  creatures=creatures.filter(c=>c.alive&&c.y-camY>-500&&c.y-camY<H+500);
  while(creatures.length<55)creatures.push(spawnCreature());
  for(let i=particles.length-1;i>=0;i--){const q=particles[i];q.x+=q.vx;q.y+=q.vy;q.vx*=0.92;q.vy*=0.92;q.life--;if(q.life<=0)particles.splice(i,1);}
  if(p.hp<=0){p.hp=0;state=2;}
  if(boss&&!boss.alive){state=3;}
}

function levelUp(){
  p.level++;p.maxHp=100+p.level*25;p.hp=Math.min(p.hp+40,p.maxHp);
  p.xp=0;p.xpNext=Math.floor(p.xpNext*1.7);
  burst(p.x,p.y-camY,[160,80,255],30,4,55);
  spawnPopup('EVOLVED — LEVEL '+p.level,'level',p.y,3000);
  sfxEvolve();
  for(let i=0;i<4;i++)creatures.push(spawnCreature());
}

// ===== DRAW HELPERS =====
function roundRect(x,y,w,h,r){
  ctx.beginPath();ctx.roundRect(x,y,w,h,r);
}
function bar(x,y,w,h,pct,col1,col2,r=3){
  ctx.fillStyle='rgba(0,10,30,0.75)';roundRect(x,y,w,h,r);ctx.fill();
  const grd=ctx.createLinearGradient(x,0,x+w*Math.max(0,pct),0);
  grd.addColorStop(0,col1);grd.addColorStop(1,col2);
  ctx.fillStyle=grd;roundRect(x,y,w*Math.max(0,pct),h,r);ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.05)';ctx.lineWidth=1;roundRect(x,y,w,h,r);ctx.stroke();
}
function hudLabel(txt,x,y,alpha=0.55,size=10){
  ctx.font=`${size}px 'Share Tech Mono',monospace`;
  ctx.fillStyle=`rgba(100,200,255,${alpha})`;
  ctx.letterSpacing='1.5px';ctx.fillText(txt,x,y);
}

// ===== HUD =====
function drawHUD(){
  const W=canvas.width,H=canvas.height;
  ctx.save();

  // --- Left panel (stats) ---
  const lx=14,ly=14,lw=150,lh=130;
  ctx.fillStyle='rgba(0,10,25,0.72)';
  roundRect(lx,ly,lw,lh,8);ctx.fill();
  ctx.strokeStyle='rgba(80,180,255,0.12)';ctx.lineWidth=1;
  roundRect(lx,ly,lw,lh,8);ctx.stroke();

  hudLabel('SIZE',lx+10,ly+22,0.45,9);
  hudLabel((p.r/14).toFixed(1)+'×',lx+60,ly+22,0.9,11);
  hudLabel('DEPTH',lx+10,ly+38,0.45,9);
  hudLabel(Math.floor(p.y)+'m',lx+60,ly+38,0.9,11);
  hudLabel('LEVEL',lx+10,ly+54,0.45,9);
  hudLabel(p.level,lx+60,ly+54,0.9,11);
  hudLabel('EATEN',lx+10,ly+70,0.45,9);
  hudLabel(p.eaten,lx+60,ly+70,0.9,11);
  hudLabel('SCORE',lx+10,ly+86,0.45,9);
  hudLabel(p.score,lx+60,ly+86,0.9,11);

  // Zone badge
  const za=zoneAccent;
  ctx.fillStyle=`rgba(${za[0]},${za[1]},${za[2]},0.12)`;
  roundRect(lx+4,ly+97,lw-8,22,5);ctx.fill();
  ctx.strokeStyle=`rgba(${za[0]},${za[1]},${za[2]},0.25)`;ctx.lineWidth=1;
  roundRect(lx+4,ly+97,lw-8,22,5);ctx.stroke();
  ctx.font="9px 'Share Tech Mono',monospace";ctx.textAlign='center';ctx.letterSpacing='2px';
  ctx.fillStyle=`rgba(${za[0]+40},${za[1]+40},${za[2]+40},0.9)`;
  ctx.fillText('◈ '+zoneName,lx+lw/2,ly+112);
  ctx.textAlign='left';

  // --- Right panel (bars) ---
  const rx=W-166, ry=14, rw=152, rh=88;
  ctx.fillStyle='rgba(0,10,25,0.72)';
  roundRect(rx,ry,rw,rh,8);ctx.fill();
  ctx.strokeStyle='rgba(80,180,255,0.12)';ctx.lineWidth=1;
  roundRect(rx,ry,rw,rh,8);ctx.stroke();

  const bx=rx+10,bw=rw-20;
  // Health bar (pulse red if low)
  const hPct=p.hp/p.maxHp;
  const hCol1=hPct<0.3?'#a00':'#0a5', hCol2=hPct<0.3?'#f44':'#2fa';
  if(hPct<0.3){ctx.save();ctx.globalAlpha=0.15+Math.sin(Date.now()*0.008)*0.1;ctx.fillStyle='rgba(255,0,0,0.3)';roundRect(rx,ry,rw,rh,8);ctx.fill();ctx.restore();}
  hudLabel('HP  '+Math.ceil(p.hp)+'/'+p.maxHp,bx,ry+22,0.55,9);
  bar(bx,ry+25,bw,6,hPct,hCol1,hCol2);
  // Hunger bar (warning color if low)
  const huPct=p.hunger/100;
  const huCol1=huPct<0.25?'#963':'#a50', huCol2=huPct<0.25?'#f96':'#fa2';
  hudLabel('HUNGER',bx,ry+46,0.55,9);
  bar(bx,ry+49,bw,6,huPct,huCol1,huCol2);
  // XP bar
  hudLabel('EVOLVE '+Math.round((p.xp/p.xpNext)*100)+'%',bx,ry+70,0.55,9);
  bar(bx,ry+73,bw,6,p.xp/p.xpNext,'#50a','#a2f');

  // --- Depth progress bar (right side vertical) ---
  const dpx=W-12,dpy=H*0.12,dph=H*0.76;
  ctx.fillStyle='rgba(0,10,25,0.6)';
  roundRect(dpx-4,dpy,8,dph,4);ctx.fill();
  // Fill up to current depth
  const depthPct=Math.min(1,p.y/5000);
  const fillH=dph*depthPct;
  const dg=ctx.createLinearGradient(0,dpy,0,dpy+dph);
  dg.addColorStop(0,'rgba(80,200,255,0.7)');
  dg.addColorStop(0.5,'rgba(60,80,200,0.7)');
  dg.addColorStop(1,'rgba(140,30,200,0.7)');
  ctx.fillStyle=dg;
  roundRect(dpx-3,dpy,6,fillH,3);ctx.fill();
  // Zone markers
  ZONE_DEPTHS.forEach((d,i)=>{
    const my=dpy+(d/5000)*dph;
    ctx.strokeStyle=`rgba(${ZONES[i].accent.join(',')},0.4)`;
    ctx.lineWidth=1;ctx.setLineDash([2,2]);
    ctx.beginPath();ctx.moveTo(dpx-10,my);ctx.lineTo(dpx+4,my);ctx.stroke();
    ctx.setLineDash([]);
  });
  // Player dot on depth bar
  const pdoty=dpy+fillH;
  ctx.beginPath();ctx.arc(dpx,pdoty,4,0,Math.PI*2);
  ctx.fillStyle='rgba(80,200,255,0.9)';ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.6)';ctx.lineWidth=1;ctx.stroke();
  // Boss marker
  if(boss&&boss.alive){
    const bossDot=dpy+(boss.y/5000)*dph;
    ctx.beginPath();ctx.arc(dpx,bossDot,4,0,Math.PI*2);
    ctx.fillStyle='rgba(200,40,255,0.9)';ctx.fill();
  }
  // Hadal label
  ctx.save();ctx.translate(dpx+8,dpy+dph*0.92);ctx.rotate(Math.PI/2);
  ctx.font="8px 'Share Tech Mono',monospace";ctx.letterSpacing='1px';
  ctx.fillStyle='rgba(140,30,200,0.45)';ctx.fillText('HADAL',0,0);
  ctx.restore();

  // --- Traits bar ---
  if(p.traits.length>0){
    let tx=14;
    p.traits.forEach(t=>{
      const lbl=TRAITS[t]||t;
      ctx.font="10px 'Share Tech Mono',monospace";
      ctx.letterSpacing='1px';
      const tw=ctx.measureText(lbl).width+18;
      ctx.fillStyle='rgba(0,15,40,0.88)';
      roundRect(tx,H-40,tw,22,11);ctx.fill();
      ctx.strokeStyle='rgba(80,180,255,0.22)';ctx.lineWidth=1;
      roundRect(tx,H-40,tw,22,11);ctx.stroke();
      ctx.fillStyle='rgba(140,220,255,0.9)';ctx.fillText(lbl,tx+9,H-25);
      tx+=tw+6;
    });
  }

  // --- Boss bar ---
  if(boss&&boss.alive){
    const bw2=Math.min(360,W*0.45),bx2=(W-bw2)/2;
    ctx.fillStyle='rgba(0,0,10,0.85)';
    roundRect(bx2-8,H-58,bw2+16,48,8);ctx.fill();
    ctx.strokeStyle='rgba(180,40,255,0.3)';ctx.lineWidth=1;
    roundRect(bx2-8,H-58,bw2+16,48,8);ctx.stroke();
    ctx.textAlign='center';
    ctx.font="10px 'Share Tech Mono',monospace";ctx.letterSpacing='3px';
    ctx.fillStyle=boss.phase>=2?'rgba(255,80,80,0.9)':'rgba(180,60,255,0.85)';
    ctx.shadowColor=boss.phase>=2?'rgba(255,0,0,0.5)':'rgba(140,0,255,0.5)';
    ctx.shadowBlur=12;
    ctx.fillText('☠  ABYSSAL COLOSSUS'+(boss.phase>=2?' — ENRAGED':''),W/2,H-44);
    ctx.shadowBlur=0;ctx.textAlign='left';
    bar(bx2,H-38,bw2,9,boss.hp/boss.maxHp,'rgba(100,0,40,0.9)','rgba(220,40,80,0.9)',4);
  }

  // --- Controls hint (bottom right, very dim) ---
  ctx.font="9px 'Share Tech Mono',monospace";ctx.letterSpacing='1px';
  ctx.fillStyle='rgba(60,100,130,0.28)';ctx.textAlign='right';
  ctx.fillText('WASD · SPACE dash · CLICK lure · P pause',W-16,H-14);
  ctx.textAlign='left';

  // --- Hunger vignette warning ---
  if(warnFlash>0){
    const vg=ctx.createRadialGradient(W/2,H/2,H*0.2,W/2,H/2,H*0.85);
    vg.addColorStop(0,'rgba(0,0,0,0)');
    vg.addColorStop(1,`rgba(160,60,0,${warnFlash*0.25})`);
    ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
    if(p.hunger<15){
      ctx.save();ctx.textAlign='center';
      ctx.font="bold 10px 'Share Tech Mono',monospace";ctx.letterSpacing='4px';
      ctx.fillStyle=`rgba(255,120,30,${0.6+Math.sin(Date.now()*0.006)*0.3})`;
      ctx.fillText('◆ STARVING ◆',W/2,H-60);
      ctx.restore();
    }
  }

  // --- Dash cooldown indicator ---
  if(p.dashCD>0){
    const dcPct=1-(p.dashCD/85);
    ctx.fillStyle='rgba(0,10,25,0.7)';
    roundRect(W/2-20,H-30,40,6,3);ctx.fill();
    bar(W/2-20,H-30,40,6,dcPct,'#28f','#6af',3);
    ctx.textAlign='center';
    ctx.font="8px 'Share Tech Mono',monospace";ctx.letterSpacing='1px';
    ctx.fillStyle='rgba(80,160,255,0.5)';
    ctx.fillText('DASH',W/2,H-35);
    ctx.textAlign='left';
  }

  ctx.restore();
}

// ===== CREATURE DRAWING =====
function drawCreature(c){
  const sx=c.x,sy=c.y-camY;
  if(sy<-100||sy>canvas.height+100)return;
  const[r,g,b]=c.tmpl.col,pulse=0.7+Math.sin(c.pulse)*0.3;
  // Danger indicator glow (red for dangerous creatures larger than player)
  const isDangerous=c.r>p.r*1.1&&c.tmpl.danger>0.4;
  if(isDangerous){
    const dr=ctx.createRadialGradient(sx,sy,c.r*0.5,sx,sy,c.r*3);
    dr.addColorStop(0,`rgba(255,40,40,0.15)`);dr.addColorStop(1,'rgba(255,0,0,0)');
    ctx.beginPath();ctx.arc(sx,sy,c.r*3,0,Math.PI*2);ctx.fillStyle=dr;ctx.fill();
  } else if(c.r<p.r*0.9){
    const pr=ctx.createRadialGradient(sx,sy,0,sx,sy,c.r*2.5);
    pr.addColorStop(0,`rgba(${r},${g},${b},0.18)`);pr.addColorStop(1,`rgba(${r},${g},${b},0)`);
    ctx.beginPath();ctx.arc(sx,sy,c.r*2.5,0,Math.PI*2);ctx.fillStyle=pr;ctx.fill();
  }
  ctx.save();ctx.translate(sx,sy);ctx.rotate(c.angle);
  const n=c.tmpl.name;
  if(n==='jellyfish'){
    ctx.beginPath();ctx.ellipse(0,0,c.r,c.r*0.65,0,Math.PI,Math.PI*2);ctx.fillStyle=`rgba(${r},${g},${b},0.55)`;ctx.fill();
    for(let t=0;t<6;t++){const tx=(t/6)*c.r*1.8-c.r*0.9,wave=Math.sin(c.wobble+t*1.3)*8;ctx.beginPath();ctx.moveTo(tx,2);ctx.quadraticCurveTo(tx+wave,c.r*1.3,tx+wave*0.5,c.r*2.2);ctx.strokeStyle=`rgba(${r},${g},${b},0.35)`;ctx.lineWidth=1.5;ctx.stroke();}
  } else if(n==='anglerfish'){
    ctx.beginPath();ctx.ellipse(0,0,c.r,c.r*0.72,0,0,Math.PI*2);ctx.fillStyle=`rgba(${r},${g},${b},0.85)`;ctx.fill();
    ctx.beginPath();ctx.moveTo(c.r*0.4,-c.r*0.5);ctx.quadraticCurveTo(c.r*1.1,-c.r*1.1,c.r*1.3,-c.r*0.8);ctx.strokeStyle=`rgba(${r},${g},${b},0.6)`;ctx.lineWidth=1.5;ctx.stroke();
    ctx.beginPath();ctx.arc(c.r*1.3,-c.r*0.8,3.5*pulse,0,Math.PI*2);ctx.fillStyle=`rgba(255,210,80,${0.8*pulse})`;ctx.fill();
  } else if(n==='manta'){
    ctx.beginPath();ctx.moveTo(c.r*1.4,0);ctx.quadraticCurveTo(0,-c.r,-c.r*1.4,0);ctx.quadraticCurveTo(0,c.r*0.4,c.r*1.4,0);ctx.fillStyle=`rgba(${r},${g},${b},0.75)`;ctx.fill();
    ctx.beginPath();ctx.moveTo(-c.r,0);ctx.lineTo(-c.r*2.5,0);ctx.strokeStyle=`rgba(${r},${g},${b},0.4)`;ctx.lineWidth=3;ctx.stroke();
  } else if(n==='squid'){
    ctx.beginPath();ctx.ellipse(0,0,c.r*0.55,c.r,0,0,Math.PI*2);ctx.fillStyle=`rgba(${r},${g},${b},0.8)`;ctx.fill();
    for(let t=0;t<8;t++){const ta=(t/8)*Math.PI*2;ctx.beginPath();ctx.moveTo(Math.cos(ta)*c.r*0.4,Math.sin(ta)*c.r*0.8);ctx.quadraticCurveTo(Math.cos(ta+0.3)*c.r*0.8+Math.sin(c.wobble+t)*5,Math.sin(ta+0.3)*c.r*1.5,Math.cos(ta)*c.r*0.5,Math.sin(ta)*c.r*2);ctx.strokeStyle=`rgba(${r},${g},${b},0.4)`;ctx.lineWidth=2;ctx.stroke();}
  } else if(n==='viperfish'){
    ctx.beginPath();ctx.ellipse(0,0,c.r*1.2,c.r*0.35,0,0,Math.PI*2);ctx.fillStyle=`rgba(${r},${g},${b},0.85)`;ctx.fill();
    ctx.beginPath();ctx.arc(c.r*0.4,-c.r*0.2,c.r*0.15,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.9)';ctx.fill();
    ctx.beginPath();ctx.arc(c.r*0.43,-c.r*0.18,c.r*0.08,0,Math.PI*2);ctx.fillStyle='rgba(200,0,0,0.9)';ctx.fill();
  } else if(n==='dragonfish'){
    ctx.beginPath();ctx.ellipse(0,0,c.r,c.r*0.4,0,0,Math.PI*2);ctx.fillStyle=`rgba(${r},${g},${b},0.85)`;ctx.fill();
    for(let i=0;i<5;i++){ctx.beginPath();ctx.arc(-c.r*0.6+i*c.r*0.3,c.r*0.25,2.5*pulse,0,Math.PI*2);ctx.fillStyle=`rgba(255,100,100,${0.7*pulse})`;ctx.fill();}
  } else if(n==='leviathan'){
    ctx.beginPath();ctx.ellipse(0,0,c.r*1.6,c.r*0.55,0,0,Math.PI*2);ctx.fillStyle=`rgba(${r},${g},${b},0.9)`;ctx.fill();
    for(let i=-4;i<=4;i++){ctx.beginPath();ctx.moveTo(i*c.r*0.35,-c.r*0.4);ctx.lineTo(i*c.r*0.35,-c.r*1);ctx.strokeStyle=`rgba(${r+20},${g+20},${b+30},0.55)`;ctx.lineWidth=3;ctx.stroke();}
  } else if(n==='seahorse'){
    ctx.beginPath();ctx.ellipse(0,-c.r*0.3,c.r*0.55,c.r*0.75,0,0,Math.PI*2);ctx.fillStyle=`rgba(${r},${g},${b},0.8)`;ctx.fill();
    ctx.beginPath();ctx.arc(0,-c.r*0.9,c.r*0.5,0,Math.PI*2);ctx.fillStyle=`rgba(${r},${g},${b},0.75)`;ctx.fill();
  } else if(n==='coelacanth'){
    ctx.beginPath();ctx.ellipse(0,0,c.r,c.r*0.6,0,0,Math.PI*2);ctx.fillStyle=`rgba(${r},${g},${b},0.82)`;ctx.fill();
    ctx.beginPath();ctx.ellipse(-c.r*0.2,-c.r*0.5,c.r*0.4,c.r*0.22,0.4,0,Math.PI*2);ctx.fillStyle=`rgba(${r},${g},${b+20},0.5)`;ctx.fill();
    ctx.beginPath();ctx.ellipse(-c.r*0.2,c.r*0.5,c.r*0.4,c.r*0.22,-0.4,0,Math.PI*2);ctx.fillStyle=`rgba(${r},${g},${b+20},0.5)`;ctx.fill();
  } else {
    ctx.beginPath();ctx.ellipse(0,0,c.r,c.r*0.62,0,0,Math.PI*2);ctx.fillStyle=`rgba(${r},${g},${b},0.82)`;ctx.fill();
    ctx.beginPath();ctx.moveTo(-c.r*0.8,0);ctx.lineTo(-c.r*1.35,-c.r*0.38+Math.sin(c.wobble)*3);ctx.lineTo(-c.r*1.35,c.r*0.38+Math.sin(c.wobble)*3);ctx.closePath();ctx.fillStyle=`rgba(${r},${g},${b},0.5)`;ctx.fill();
    if(c.r>8){ctx.beginPath();ctx.arc(c.r*0.38,-c.r*0.16,c.r*0.18,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.9)';ctx.fill();ctx.beginPath();ctx.arc(c.r*0.41,-c.r*0.13,c.r*0.1,0,Math.PI*2);ctx.fillStyle='rgba(0,0,10,0.95)';ctx.fill();}
  }
  ctx.restore();
}

function drawBoss(){
  if(!boss||!boss.alive)return;
  const sx=boss.x,sy=boss.y-camY;
  if(sy<-200||sy>canvas.height+200)return;
  const pulse=0.6+Math.sin(boss.pulse)*0.4;
  const og=ctx.createRadialGradient(sx,sy,0,sx,sy,boss.r*3.5);
  og.addColorStop(0,`rgba(120,20,180,${0.22+pulse*0.1})`);og.addColorStop(1,'rgba(60,0,100,0)');
  ctx.beginPath();ctx.arc(sx,sy,boss.r*3.5,0,Math.PI*2);ctx.fillStyle=og;ctx.fill();
  ctx.save();ctx.translate(sx,sy);
  boss.tentacles.forEach(t=>{
    t.wobble+=0.03;
    const ax=Math.cos(t.angle+boss.wobble)*boss.r*0.7,ay=Math.sin(t.angle+boss.wobble)*boss.r*0.7;
    const ex=Math.cos(t.angle+boss.wobble+Math.sin(t.wobble)*0.4)*t.len,ey=Math.sin(t.angle+boss.wobble+Math.sin(t.wobble)*0.4)*t.len;
    ctx.beginPath();ctx.moveTo(ax,ay);ctx.quadraticCurveTo((ax+ex)/2+Math.sin(t.wobble)*20,(ay+ey)/2+Math.cos(t.wobble)*20,ex,ey);
    ctx.strokeStyle=`rgba(140,30,200,0.55)`;ctx.lineWidth=boss.phase>=2?5:3.5;ctx.stroke();
    ctx.beginPath();ctx.arc(ex,ey,4,0,Math.PI*2);ctx.fillStyle='rgba(180,50,255,0.7)';ctx.fill();
  });
  const bg=ctx.createRadialGradient(-boss.r*0.2,-boss.r*0.2,0,0,0,boss.r);
  bg.addColorStop(0,'rgba(120,20,200,0.9)');bg.addColorStop(0.6,'rgba(60,0,100,0.85)');bg.addColorStop(1,'rgba(40,0,70,0.7)');
  ctx.beginPath();ctx.arc(0,0,boss.r,0,Math.PI*2);ctx.fillStyle=bg;ctx.fill();
  [{x:-boss.r*0.25,y:-boss.r*0.15},{x:boss.r*0.25,y:-boss.r*0.15},{x:0,y:boss.r*0.2}].forEach(ep=>{
    ctx.beginPath();ctx.arc(ep.x,ep.y,boss.r*0.15,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.9)';ctx.fill();
    ctx.beginPath();ctx.arc(ep.x,ep.y,boss.r*0.1,0,Math.PI*2);ctx.fillStyle=boss.phase>=2?'rgba(255,30,30,0.95)':'rgba(80,0,160,0.95)';ctx.fill();
  });
  if(boss.phase>=2){for(let i=0;i<6;i++){const ca=(i/6)*Math.PI*2+boss.wobble,cr=boss.r*(0.6+Math.random()*0.5);ctx.beginPath();ctx.arc(Math.cos(ca)*cr,Math.sin(ca)*cr,3,0,Math.PI*2);ctx.fillStyle=`rgba(255,60,60,${0.4+Math.random()*0.4})`;ctx.fill();}}
  ctx.restore();
}

function drawPlayer(){
  if(!p)return;
  const sx=p.x,sy=p.y-camY;
  if(p.iframes>0&&Math.floor(p.iframes/4)%2===1)return;
  const[r,g,b]=[80,200,255];
  p.trail.forEach((t,i)=>{if(!t)return;const f=1-i/p.trail.length;ctx.beginPath();ctx.arc(t.x,t.y,p.r*0.28*f,0,Math.PI*2);ctx.fillStyle=`rgba(${r},${g},${b},${f*0.22})`;ctx.fill();});
  const og=ctx.createRadialGradient(sx,sy,0,sx,sy,p.r*5);og.addColorStop(0,`rgba(${r},${g},${b},0.1)`);og.addColorStop(1,`rgba(${r},${g},${b},0)`);ctx.beginPath();ctx.arc(sx,sy,p.r*5,0,Math.PI*2);ctx.fillStyle=og;ctx.fill();
  ctx.save();ctx.translate(sx,sy);ctx.rotate(p.angle);
  const bg2=ctx.createRadialGradient(-p.r*0.2,-p.r*0.2,0,0,0,p.r*1.3);bg2.addColorStop(0,`rgba(${Math.min(255,r+80)},${Math.min(255,g+80)},255,0.92)`);bg2.addColorStop(1,`rgba(${r},${g},${b},0.65)`);
  ctx.beginPath();ctx.ellipse(0,0,p.r,p.r*0.64,0,0,Math.PI*2);ctx.fillStyle=bg2;ctx.fill();
  ctx.beginPath();ctx.moveTo(-p.r*0.1,-p.r*0.6);ctx.quadraticCurveTo(p.r*0.4,-p.r*1.2,p.r*0.55,-p.r*0.6);ctx.fillStyle=`rgba(${r},${g},${b},0.4)`;ctx.fill();
  ctx.beginPath();ctx.moveTo(-p.r*0.75,0);ctx.lineTo(-p.r*1.35,-p.r*0.45);ctx.lineTo(-p.r*1.35,p.r*0.45);ctx.closePath();ctx.fillStyle=`rgba(${r},${g},${b},0.45)`;ctx.fill();
  ctx.beginPath();ctx.arc(p.r*0.38,-p.r*0.16,p.r*0.22,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.92)';ctx.fill();
  ctx.beginPath();ctx.arc(p.r*0.42,-p.r*0.13,p.r*0.13,0,Math.PI*2);ctx.fillStyle='rgba(0,0,15,0.95)';ctx.fill();
  ctx.beginPath();ctx.arc(p.r*0.45,-p.r*0.17,p.r*0.05,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.7)';ctx.fill();
  if(p.luminous){const t4=Date.now()*0.004;for(let i=0;i<6;i++){const a=(i/6)*Math.PI*2+t4;ctx.beginPath();ctx.arc(Math.cos(a)*p.r*0.5,Math.sin(a)*p.r*0.3,2.5,0,Math.PI*2);ctx.fillStyle=`rgba(200,120,255,${0.5+Math.sin(t4+i)*0.3})`;ctx.fill();}}
  ctx.restore();
}

// ===== CLICK HANDLING =====
function handleClick(cx,cy){
  if(state===0){ const btn=drawTitle._btn; if(btn&&cx>=btn.x&&cx<=btn.x+btn.w&&cy>=btn.y&&cy<=btn.y+btn.h) startGame(); return; }
  if(state===2){ const btn=drawDead._btn; if(btn&&cx>=btn.x&&cx<=btn.x+btn.w&&cy>=btn.y&&cy<=btn.y+btn.h) startGame(); return; }
  if(state===3){ const btn=drawWin._btn; if(btn&&cx>=btn.x&&cx<=btn.x+btn.w&&cy>=btn.y&&cy<=btn.y+btn.h) startGame(); return; }
  if(state===4) return;
  if(state===1){
    getAC();
    lures.push({x:cx,y:cy,worldY:cy+camY,life:130});
    burst(cx,cy,[80,200,255],12,2.5,35);
    // Ripple visual at click point
    particles.push({x:cx,y:cy,vx:0,vy:0,col:[80,200,255],life:40,maxLife:40,r:30,ring:true});
    if(boss&&boss.alive){
      const bsx=cx-boss.x,bsy=cy-(boss.y-camY);
      if(Math.sqrt(bsx*bsx+bsy*bsy)<boss.r+10){boss.hp-=8;sfxBoss();burst(boss.x,boss.y-camY,[180,50,255],8,4,30);if(boss.hp<=0)boss.alive=false;}
    }
  }
}

canvas.addEventListener('click',e=>handleClick(e.clientX,e.clientY));
canvas.addEventListener('touchend',e=>{e.preventDefault();const t=e.changedTouches[0];if(t)handleClick(t.clientX,t.clientY);},{passive:false});

// ===== INPUT =====
document.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if([' ','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key))e.preventDefault();
  if((e.key==='Escape'||e.key==='p'||e.key==='P')&&(state===1||state===4))togglePause();
});
document.addEventListener('keyup',e=>keys[e.key]=false);

// Touch drag movement
let ltp=null;
canvas.addEventListener('touchstart',e=>{e.preventDefault();},{passive:false});
canvas.addEventListener('touchmove',e=>{e.preventDefault();if(state!==1||!e.touches[0])return;const t=e.touches[0];if(ltp){if(p){p.vx+=(t.clientX-ltp.x)*0.18;p.vy+=(t.clientY-ltp.y)*0.18;}}ltp={x:t.clientX,y:t.clientY};},{passive:false});
canvas.addEventListener('touchend',()=>ltp=null,{passive:true});

// Mobile joystick
const joystickEl=document.getElementById('joystick');
const joystickBase=document.getElementById('joystickBase');
const joystickKnob=document.getElementById('joystickKnob');
let joystickId=null,joystickOrigin={x:0,y:0};
joystickEl.addEventListener('touchstart',e=>{
  e.stopPropagation();e.preventDefault();
  const t=e.changedTouches[0];
  joystickId=t.identifier;joystickActive=true;
  const rect=joystickBase.getBoundingClientRect();
  joystickOrigin={x:rect.left+rect.width/2,y:rect.top+rect.height/2};
},{passive:false});
joystickEl.addEventListener('touchmove',e=>{
  e.stopPropagation();e.preventDefault();
  if(!joystickActive)return;
  const t=Array.from(e.changedTouches).find(t=>t.identifier===joystickId);
  if(!t)return;
  const dx=t.clientX-joystickOrigin.x,dy=t.clientY-joystickOrigin.y;
  const len=Math.sqrt(dx*dx+dy*dy)||1;
  const maxR=30;
  const clampedLen=Math.min(len,maxR);
  joystickDx=dx/len;joystickDy=dy/len;
  joystickKnob.style.transform=`translate(calc(-50% + ${(joystickDx*clampedLen)}px), calc(-50% + ${(joystickDy*clampedLen)}px))`;
},{passive:false});
joystickEl.addEventListener('touchend',e=>{
  joystickActive=false;joystickDx=0;joystickDy=0;
  joystickKnob.style.transform='translate(-50%,-50%)';
},{passive:false});

// ===== START =====
function startGame(){
  getAC();
  initPlayer();creatures=[];particles=[];lures=[];inkClouds=[];
  camY=0;currentZone=0;bossSpawned=false;boss=null;
  zoneAccent=ZONES[0].accent;zoneName=ZONES[0].name;
  warnFlash=0;
  for(let i=0;i<55;i++)creatures.push(spawnCreature());
  state=1;
  document.getElementById('pauseScreen').classList.remove('active');
  startAmbient(0);
  spawnPopup('hunt  ·  eat  ·  evolve  ·  reach the hadal zone','zone',null,3500);
}

// ===== DRAW MAIN =====
function draw(){
  const W=canvas.width,H=canvas.height;
  const zone=ZONES[currentZone]||ZONES[0];

  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,`rgb(${zone.bg0.join(',')})`);
  bg.addColorStop(1,`rgb(${zone.bg1.join(',')})`);
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

  if(state>=1){
    if(currentZone<=1){
      const op=(1-currentZone*0.5)*0.045,t=Date.now()*0.0004;
      for(let i=0;i<7;i++){const rx=(W/7)*i+50+Math.sin(t+i)*20,rw=40+Math.sin(t*0.7+i*1.3)*15;
        ctx.beginPath();ctx.moveTo(rx-rw,0);ctx.lineTo(rx+rw,0);ctx.lineTo(rx+rw*2.5,H);ctx.lineTo(rx-rw*2.5,H);ctx.closePath();ctx.fillStyle=`rgba(100,180,255,${op})`;ctx.fill();}
    }
    if(zone.fog>0){const fg=ctx.createLinearGradient(0,0,0,H);fg.addColorStop(0,`rgba(0,0,8,${zone.fog*0.5})`);fg.addColorStop(1,`rgba(0,0,8,${zone.fog})`);ctx.fillStyle=fg;ctx.fillRect(0,0,W,H);}
    if(currentZone===3){const t2=Date.now()*0.0003;for(let i=0;i<40;i++){const ex=((i*211+Math.sin(t2*1.5+i)*30)%W+W)%W,ey=((i*173+camY*0.2+Math.sin(t2+i*0.7)*20)%H+H)%H,ea=0.05+(Math.sin(t2*3+i)*0.5+0.5)*0.2;ctx.beginPath();ctx.arc(ex,ey,1.6,0,Math.PI*2);ctx.fillStyle=`rgba(180,60,220,${ea})`;ctx.fill();}}
    const t3=Date.now()*0.0003,mc=currentZone>=2?80:60;
    for(let i=0;i<mc;i++){const mx=((i*137.5+Math.sin(t3+i)*22)%W+W)%W,my=((i*97.3+camY*0.15+Math.cos(t3*0.7+i)*18)%H+H)%H,ma=0.04+(Math.sin(t3*2+i)*0.5+0.5)*0.1;ctx.beginPath();ctx.arc(mx,my,1.3,0,Math.PI*2);ctx.fillStyle=`rgba(${zone.accent.join(',')},${ma})`;ctx.fill();}
    inkClouds.forEach(ik=>{const sy=ik.y-camY;if(sy<-200||sy>H+200)return;const ig=ctx.createRadialGradient(ik.x,sy,0,ik.x,sy,ik.r);ig.addColorStop(0,`rgba(10,0,30,${ik.alpha})`);ig.addColorStop(1,'rgba(10,0,30,0)');ctx.beginPath();ctx.arc(ik.x,sy,ik.r,0,Math.PI*2);ctx.fillStyle=ig;ctx.fill();});
    lures.forEach(l=>{const sy=l.worldY-camY,a=l.life/130;const lg=ctx.createRadialGradient(l.x,sy,0,l.x,sy,65);lg.addColorStop(0,`rgba(80,200,255,${a*0.5})`);lg.addColorStop(1,'rgba(80,200,255,0)');ctx.beginPath();ctx.arc(l.x,sy,65,0,Math.PI*2);ctx.fillStyle=lg;ctx.fill();ctx.beginPath();ctx.arc(l.x,sy,5,0,Math.PI*2);ctx.fillStyle=`rgba(80,200,255,${a})`;ctx.fill();
      // ripple rings on lure
      const rings=3;for(let i=0;i<rings;i++){const rp=((Date.now()*0.001+i/rings)%1);ctx.beginPath();ctx.arc(l.x,sy,5+rp*60,0,Math.PI*2);ctx.strokeStyle=`rgba(80,200,255,${a*(1-rp)*0.3})`;ctx.lineWidth=1;ctx.stroke();}
    });
    creatures.forEach(drawCreature);
    if(boss&&boss.alive)drawBoss();
    particles.forEach(q=>{
      if(!q.col)return;
      const a=q.life/q.maxLife;
      const[r,g,b]=q.col;
      if(q.ring){
        ctx.beginPath();ctx.arc(q.x,q.y,q.r*(1-a),0,Math.PI*2);
        ctx.strokeStyle=`rgba(${r},${g},${b},${a*0.6})`;ctx.lineWidth=2;ctx.stroke();
      } else {
        ctx.beginPath();ctx.arc(q.x,q.y,q.r*a,0,Math.PI*2);
        ctx.fillStyle=`rgba(${r},${g},${b},${a*0.85})`;ctx.fill();
      }
    });
    if(state===1)drawPlayer();
    drawHUD();
  }

  // Overlay fade
  if(fadeAlpha>0){ctx.fillStyle=`rgba(0,0,0,${fadeAlpha})`;ctx.fillRect(0,0,W,H);}

  if(state===0) drawTitle();
  if(state===2) drawDead();
  if(state===3) drawWin();
}

// ===== LOOP =====
let last=0;
function loop(ts){
  const dt=Math.min((ts-last)/16.67,3);last=ts;
  updateFade();
  if(state===1)update();
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
