<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIC — Locked</title>
<link rel="icon" href="vic_icon.jpeg">
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@700;800&family=JetBrains+Mono:wght@400;500&display=swap');
* { box-sizing:border-box; margin:0; padding:0; }
body {
  font-family:'DM Sans',system-ui,sans-serif;
  background:#0f1623;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}
body::before {
  content:'';
  position:fixed;
  inset:0;
  background:radial-gradient(ellipse 60% 50% at 50% 30%, rgba(56,189,248,0.06) 0%, transparent 70%);
  pointer-events:none;
}
.lock-wrap {
  width:340px;
  text-align:center;
  animation:fadeIn .4s ease forwards;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.logo { margin-bottom:28px; }
.logo img {
  width:110px;
  height:110px;
  border-radius:26px;
  margin-bottom:16px;
  box-shadow: 0 0 40px rgba(56,189,248,0.25), 0 0 80px rgba(56,189,248,0.08);
  display:block;
  margin-left:auto;
  margin-right:auto;
}
.logo .vic { font-family:'Syne',sans-serif; font-size:32px; font-weight:700; color:#38bdf8; letter-spacing:4px; }
.logo .sub { font-size:11px; color:#f59e0b; letter-spacing:2px; text-transform:uppercase; margin-top:2px; }
.lock-card {
  background:#161e2e;
  border:1px solid rgba(56,189,248,0.15);
  border-radius:16px;
  padding:28px 24px 24px;
}
.lock-title { font-size:14px; color:#94a3b8; margin-bottom:20px; letter-spacing:0.3px; }
.pin-dots { display:flex; justify-content:center; gap:14px; margin-bottom:24px; }
.pin-dot {
  width:14px; height:14px;
  border-radius:50%;
  border:2px solid rgba(56,189,248,0.3);
  background:transparent;
  transition:all .15s;
}
.pin-dot.filled { background:#00a8ff; border-color:#38bdf8; box-shadow:0 0 8px rgba(56,189,248,0.5); }
.pin-dot.error { background:#ff3d5a; border-color:#ff3d5a; box-shadow:0 0 8px rgba(255,61,90,0.5); animation:shake .3s ease; }
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.keypad { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:14px; }
.key {
  background:rgba(56,189,248,0.06);
  border:1px solid rgba(56,189,248,0.15);
  border-radius:10px;
  padding:16px 0;
  font-family:'Syne',sans-serif;
  font-size:22px;
  font-weight:600;
  color:#e8f4ff;
  cursor:pointer;
  transition:all .1s;
  user-select:none;
}
.key:hover { background:rgba(56,189,248,0.12); border-color:rgba(56,189,248,0.35); }
.key:active { transform:scale(0.95); background:rgba(56,189,248,0.2); }
.key.del { font-size:16px; color:#94a3b8; }
.key.empty { background:transparent; border-color:transparent; cursor:default; }
.key.enter {
  background:#185FA5;
  border-color:#185FA5;
  color:#fff;
  font-size:14px;
  font-weight:500;
  letter-spacing:.5px;
}
.key.enter:hover { background:#0C447C; }
.err-msg { font-size:12px; color:#ff3d5a; min-height:18px; margin-top:4px; }
.setup-hint { font-size:12px; color:#3d5a72; margin-top:14px; }
.setup-link { color:#f59e0b; cursor:pointer; text-decoration:underline; }
/* Setup mode */
.setup-steps { font-size:12px; color:#94a3b8; margin-bottom:16px; line-height:1.8; }
.step-active { color:#38bdf8; font-weight:500; }
</style>
</head>
<body>
<div class="lock-wrap">
  <div class="logo">
    <img src="vic_icon.jpeg" alt="VIC" onerror="this.style.display='none'">
    <div class="vic">VIC</div>
    <div class="sub">Vegas Intelligence Console</div>
  </div>

  <div class="lock-card">
    <div class="lock-title" id="lock-title">Enter PIN to access VIC</div>

    <div class="pin-dots" id="pin-dots">
      <div class="pin-dot" id="d0"></div>
      <div class="pin-dot" id="d1"></div>
      <div class="pin-dot" id="d2"></div>
      <div class="pin-dot" id="d3"></div>
    </div>

    <div class="keypad">
      <div class="key" onclick="press('1')">1</div>
      <div class="key" onclick="press('2')">2</div>
      <div class="key" onclick="press('3')">3</div>
      <div class="key" onclick="press('4')">4</div>
      <div class="key" onclick="press('5')">5</div>
      <div class="key" onclick="press('6')">6</div>
      <div class="key" onclick="press('7')">7</div>
      <div class="key" onclick="press('8')">8</div>
      <div class="key" onclick="press('9')">9</div>
      <div class="key del" onclick="del()">⌫</div>
      <div class="key" onclick="press('0')">0</div>
      <div class="key enter" onclick="submit()">ENTER</div>
    </div>

    <div class="err-msg" id="err-msg"></div>
    <div class="setup-hint" id="setup-hint"></div>
  </div>
</div>

<script>
const STORAGE_KEY = 'vic_pin_hash';
let input = '';
let mode = 'unlock'; // 'unlock' | 'setup1' | 'setup2'
let tempPin = '';
let attempts = 0;
let locked = false;
let lockTimer = null;

function hashPin(pin) {
  // Simple hash — not cryptographic but keeps PIN out of plain text
  let h = 0;
  for (let i = 0; i < pin.length; i++) {
    h = Math.imul(31, h) + pin.charCodeAt(i) | 0;
  }
  return h.toString(36) + pin.length;
}

function getStoredHash() {
  return localStorage.getItem(STORAGE_KEY);
}

function init() {
  const stored = getStoredHash();
  if (!stored) {
    mode = 'setup1';
    document.getElementById('lock-title').textContent = 'Create a 4-digit PIN';
    document.getElementById('setup-hint').innerHTML = 'First time setup — choose a PIN to protect VIC.';
  } else {
    mode = 'unlock';
    document.getElementById('lock-title').textContent = 'Enter PIN to access VIC';
    document.getElementById('setup-hint').innerHTML = `<span class="setup-link" onclick="resetPin()">Forgot PIN? Reset</span>`;
  }
}

function press(digit) {
  if (locked) return;
  if (input.length >= 4) return;
  input += digit;
  updateDots();
  if (input.length === 4) setTimeout(submit, 120);
}

function del() {
  if (locked) return;
  input = input.slice(0, -1);
  updateDots();
  document.getElementById('err-msg').textContent = '';
}

function updateDots() {
  for (let i = 0; i < 4; i++) {
    const dot = document.getElementById('d' + i);
    dot.className = 'pin-dot' + (i < input.length ? ' filled' : '');
  }
}

function showError(msg) {
  document.getElementById('err-msg').textContent = msg;
  for (let i = 0; i < 4; i++) {
    const dot = document.getElementById('d' + i);
    dot.className = 'pin-dot error';
  }
  setTimeout(() => {
    input = '';
    updateDots();
  }, 600);
}

function submit() {
  if (locked) return;
  if (input.length < 4) {
    showError('Enter 4 digits');
    input = '';
    return;
  }

  if (mode === 'setup1') {
    tempPin = input;
    input = '';
    updateDots();
    mode = 'setup2';
    document.getElementById('lock-title').textContent = 'Confirm your PIN';
    document.getElementById('err-msg').textContent = '';
    document.getElementById('setup-hint').innerHTML = 'Enter the same PIN again to confirm.';
    return;
  }

  if (mode === 'setup2') {
    if (input === tempPin) {
      localStorage.setItem(STORAGE_KEY, hashPin(input));
      unlock();
    } else {
      showError('PINs do not match — try again');
      mode = 'setup1';
      tempPin = '';
      input = '';
      document.getElementById('lock-title').textContent = 'Create a 4-digit PIN';
      document.getElementById('setup-hint').innerHTML = 'Choose a PIN to protect VIC.';
    }
    return;
  }

  // Unlock mode
  if (hashPin(input) === getStoredHash()) {
    attempts = 0;
    unlock();
  } else {
    attempts++;
    input = '';
    if (attempts >= 5) {
      locked = true;
      let secs = 30;
      document.getElementById('lock-title').textContent = `Too many attempts — wait ${secs}s`;
      showError('');
      lockTimer = setInterval(() => {
        secs--;
        document.getElementById('lock-title').textContent = `Too many attempts — wait ${secs}s`;
        if (secs <= 0) {
          clearInterval(lockTimer);
          locked = false;
          attempts = 0;
          document.getElementById('lock-title').textContent = 'Enter PIN';
          document.getElementById('err-msg').textContent = '';
        }
      }, 1000);
    } else {
      showError(`Incorrect PIN — ${5 - attempts} attempt${5 - attempts !== 1 ? 's' : ''} left`);
    }
  }
}

function unlock() {
  document.getElementById('lock-title').textContent = 'Access granted';
  document.getElementById('err-msg').textContent = '';
  for (let i = 0; i < 4; i++) document.getElementById('d' + i).className = 'pin-dot filled';
  setTimeout(() => {
    // Go to dashboard
    window.location.href = 'index.html';
  }, 400);
}

function resetPin() {
  if (!confirm('Reset your PIN? You will need to create a new one.')) return;
  localStorage.removeItem(STORAGE_KEY);
  location.reload();
}

// Keyboard support
document.addEventListener('keydown', e => {
  if (e.key >= '0' && e.key <= '9') press(e.key);
  else if (e.key === 'Backspace') del();
  else if (e.key === 'Enter') submit();
});

init();
</script>
</body>
</html>
